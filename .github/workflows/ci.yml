name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: injectkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/injectkit?schema=public
      JWT_SECRET: "ci-test-jwt-secret-min-32-chars-long!!"
      NODE_ENV: development
      ALLOW_DEV_AUTO_AUTH: "true"
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate --schema=../prisma/schema.prisma
      - name: Apply migrations
        run: npx prisma migrate deploy --schema=../prisma/schema.prisma
      - name: Run Vitest
        run: npm test

  extension-build:
    runs-on: ubuntu-latest
    env:
      PLASMO_PUBLIC_API_URL: https://promptkit-railway-api-production.up.railway.app
      NODE_ENV: production
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build:prod
      - name: Verify production manifest
        run: npm run verify:prod-manifest
